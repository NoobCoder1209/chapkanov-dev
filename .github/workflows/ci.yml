name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm check

      - run: pnpm build

      - name: Verify dist artifacts
        run: |
          set -e
          test -f dist/index.html
          test -f dist/sitemap-index.xml
          test -f dist/sitemap-0.xml
          test -f dist/robots.txt
          test -f dist/og-default.png
          test -f dist/404.html
          test -f dist/500.html
          test -f dist/contact/index.html
          test -f dist/now/index.html
          # Drive project-page checks from the source filesystem so adding
          # a new MDX file under src/content/projects/ self-extends this
          # gate without manual workflow edits.
          for f in src/content/projects/*.mdx; do
            slug=$(basename "$f" .mdx)
            test -f "dist/projects/$slug/index.html"
          done
          echo "All expected artifacts present."
